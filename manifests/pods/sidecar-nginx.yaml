apiVersion: v1
kind: Pod
metadata:
  name: sidecar-nginx
  labels:
    app: sidecar-demo
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    volumeMounts:
    - name: shared-logs
      mountPath: /var/log/nginx
  - name: log-sidecar
    image: busybox
    command: ['/bin/sh', '-c', 'tail -n+1 -f /logs/access.log']
    volumeMounts:
    - name: shared-logs
      mountPath: /logs
  volumes:
  - name: shared-logs
    emptyDir: {}
